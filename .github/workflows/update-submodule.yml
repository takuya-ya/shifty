name: Update Submodule Pointer

on:
  repository_dispatch:
    types: [submodule-updated]

jobs:
  update-submodule:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout parent repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_SHIFTY }}
          submodules: false

      - name: Update submodule to latest
        run: |
          git submodule update --init ${{ github.event.client_payload.submodule }}
          git submodule update --remote ${{ github.event.client_payload.submodule }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ github.event.client_payload.submodule }}
          git diff --staged --quiet || git commit -m "chore: ${{ github.event.client_payload.submodule }} のコミットIDを更新"
          git push origin main
